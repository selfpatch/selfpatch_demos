# ros2_medkit gateway configuration for Actuation ECU
# Aggregation disabled but announces via mDNS for peer discovery
actuation:
  ros2_medkit_gateway:
    ros__parameters:
      server:
        host: "0.0.0.0"
        port: 8080

      discovery:
        mode: "hybrid"
        manifest_path: ""  # Set via launch argument
        manifest_strict_validation: true
        runtime:
          create_synthetic_components: false
          create_synthetic_areas: false

      aggregation:
        enabled: false
        announce: true
        mdns_service: "_medkit._tcp.local"

      cors:
        allowed_origins: ["*"]
        allowed_methods: ["GET", "PUT", "POST", "DELETE", "OPTIONS"]

      scripts:
        scripts_dir: "/var/lib/ros2_medkit/scripts"

  # Actuation node parameters
  motor_controller:
    ros__parameters:
      torque_noise: 0.01
      failure_probability: 0.0
      status_rate: 20.0

  joint_driver:
    ros__parameters:
      inject_overheat: false
      drift_rate: 0.0
      failure_probability: 0.0
      driver_rate: 50.0

  gripper_controller:
    ros__parameters:
      inject_jam: false
      failure_probability: 0.0
      gripper_rate: 10.0

# Fault Manager configuration (runs in root namespace)
fault_manager:
  ros__parameters:
    storage_type: "sqlite"
    database_path: "/var/lib/ros2_medkit/faults.db"
    snapshots:
      enabled: false
