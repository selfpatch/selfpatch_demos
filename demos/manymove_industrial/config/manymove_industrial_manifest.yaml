manifest_version: "1.0"
metadata:
  name: "manymove-industrial"
  description: "manymove BT manipulator pipeline (xArm7 fake hardware) with medkit fault reporting"
  version: "0.1.0"

config:
  unmanifested_nodes: "warn"
  inherit_runtime_resources: true

areas:
  - id: manipulation
    name: "Manipulation"
    description: "xArm7 cobot under fake_components hardware"
    namespace: /
  - id: planning
    name: "Planning"
    description: "BehaviorTree.CPP orchestration and MoveIt motion planning"
    namespace: /
  - id: diagnostics
    name: "Diagnostics"
    description: "ros2_medkit fault management"
    namespace: /
  - id: conveyor-line
    name: "Conveyor line"
    description: "PLC-driven conveyor line: photoeyes, motor, e-stop"
    namespace: /
  - id: bridge
    name: "Bridges"
    description: "Cross-protocol bridges (OPC UA, etc.)"
    namespace: /

components:
  - id: xarm7-arm
    name: "xArm 7 manipulator"
    type: "manipulator"
    description: "7-DoF cobot, fake_components hardware"
    area: manipulation
  - id: ufactory-driver
    name: "UFactory ROS 2 driver"
    type: "driver"
    description: "xarm_ros2 driver layer (fake mode)"
    area: manipulation
  - id: manymove-bt
    name: "manymove BT client"
    type: "controller"
    description: "BehaviorTree.CPP orchestration of pick/place sequences"
    area: planning
  - id: manymove-planning
    name: "manymove planning subsystem"
    type: "controller"
    description: "Logical grouping for planning-side container scripts (collision inject, restore, self-test)"
    area: planning
  - id: move-group
    name: "MoveIt move_group"
    type: "planner"
    description: "OMPL motion planner"
    area: planning
  - id: object-manager
    name: "manymove object_manager"
    type: "service"
    description: "Planning scene collision objects"
    area: planning
  - id: action-server
    name: "manymove planner action_server"
    type: "service"
    description: "MoveManipulator / PlanManipulator action servers"
    area: planning
  - id: gateway
    name: "ros2_medkit gateway"
    type: "diagnostics"
    description: "HTTP REST API for fault inspection"
    area: diagnostics
  - id: fault-manager
    name: "ros2_medkit fault_manager"
    type: "diagnostics"
    description: "SQLite-backed fault store"
    area: diagnostics
  - id: openplc
    name: "Line PLC (OPC UA)"
    type: "controller"
    description: "IEC 61131-3 soft PLC exposing photoeye / conveyor / e-stop tags + AlarmConditionType events"
    area: conveyor-line
  - id: photoeye-pick
    name: "Pick photoeye"
    type: "sensor"
    description: "Diffuse-mode photoelectric sensor at pick position"
    area: conveyor-line
  - id: photoeye-drop
    name: "Drop photoeye"
    type: "sensor"
    description: "Diffuse-mode photoelectric sensor at drop position"
    area: conveyor-line
  - id: conveyor-motor
    name: "Conveyor motor"
    type: "actuator"
    description: "Belt drive motor"
    area: conveyor-line
  - id: opcua-bridge
    name: "OPC UA -> medkit bridge"
    type: "bridge"
    description: "Subscribes to PLC AlarmConditionType events and forwards them as medkit faults"
    area: bridge
  - id: conveyor-line
    name: "Conveyor line subsystem"
    type: "controller"
    description: "Logical grouping for line-side container scripts (PLC alarm inject / restore)"
    area: conveyor-line

apps:
  - id: bt-client-xarm7
    name: "BT client (xArm7)"
    category: "controller"
    is_located_on: manymove-bt
    ros_binding:
      namespace: /
      node_name: bt_client_xarm7
  - id: hmi-service-node
    name: "HMI service node"
    category: "controller"
    is_located_on: manymove-bt
    ros_binding:
      namespace: /
      node_name: hmi_service_node
  - id: move-group-app
    name: "move_group"
    category: "planner"
    is_located_on: move-group
    ros_binding:
      namespace: /
      node_name: move_group
  - id: action-server-app
    name: "action_server_node"
    category: "service"
    is_located_on: action-server
    ros_binding:
      namespace: /
      node_name: action_server_node
  - id: object-manager-app
    name: "object_manager_node"
    category: "service"
    is_located_on: object-manager
    ros_binding:
      namespace: /
      node_name: object_manager_node
  - id: ufactory-driver-app
    name: "ufactory_driver"
    category: "driver"
    is_located_on: ufactory-driver
    ros_binding:
      namespace: /
      node_name: ufactory_driver
  - id: fault-manager-app
    name: "fault_manager"
    category: "diagnostics"
    is_located_on: fault-manager
    ros_binding:
      namespace: /
      node_name: fault_manager
  - id: gateway-app
    name: "ros2_medkit_gateway"
    category: "diagnostics"
    is_located_on: gateway
    ros_binding:
      namespace: /
      node_name: ros2_medkit_gateway
  - id: openplc-runtime
    name: "OpenPLC runtime"
    category: "controller"
    is_located_on: openplc
    ros_binding:
      namespace: /plc
      node_name: openplc_runtime
  - id: opcua-bridge-app
    name: "opcua_bridge"
    category: "bridge"
    is_located_on: opcua-bridge
    ros_binding:
      namespace: /plc
      node_name: sensor_io

functions:
  - id: pick-and-place
    name: "Pick and place"
    category: "manipulation"
    description: "BT-driven manipulation sequence on fake xArm7"
    hosted_by:
      - bt-client-xarm7
      - move-group-app
      - action-server-app
      - object-manager-app
  - id: hmi-control
    name: "Operator control"
    category: "interaction"
    description: "Qt HMI panel for blackboard mutation and BT reset"
    hosted_by:
      - hmi-service-node
      - bt-client-xarm7
  - id: fault-management
    name: "Fault management"
    category: "diagnostics"
    description: "Capture, persist, and surface BT runtime failures emitted by manymove_cpp_trees"
    hosted_by:
      - fault-manager-app
      - gateway-app
  - id: line-control
    name: "Line control"
    category: "controller"
    description: "PLC-driven conveyor sequencing with safety interlocks"
    hosted_by:
      - openplc-runtime
  - id: fault-aggregation
    name: "Cross-source fault aggregation"
    category: "diagnostics"
    description: "Bridge PLC AlarmConditionType events into the same medkit FaultManager that aggregates ROS-side faults"
    hosted_by:
      - opcua-bridge-app
      - fault-manager-app
      - gateway-app
