# ros2_medkit gateway configuration for Sensor Diagnostics Demo
# Gateway runs under /diagnostics namespace
diagnostics:
  ros2_medkit_gateway:
    ros__parameters:
      server:
        host: "0.0.0.0"
        port: 8080

      refresh_interval_ms: 10000  # 10 seconds (default), reduces log spam

      cors:
        allowed_origins: ["*"]
        allowed_methods: ["GET", "PUT", "POST", "DELETE", "OPTIONS"]
        allowed_headers: ["Content-Type", "Accept"]
        allow_credentials: false
        max_age_seconds: 86400

      # Discovery configuration
      discovery:
        mode: "hybrid"  # runtime_only, manifest_only, or hybrid
        manifest_path: ""  # Will be set via launch argument
        manifest_strict_validation: true
        runtime:
          create_synthetic_components: false  # Manifest defines components
          create_synthetic_areas: false  # Manifest defines areas
        merge_pipeline:
          gap_fill:
            allow_heuristic_areas: false  # Manifest defines all areas
            allow_heuristic_components: false  # Manifest defines all components
            allow_heuristic_apps: false  # Manifest defines all apps

      # Plugin configuration (set by launch file when .so paths are resolved)
      plugins: [""]

      # Scripts configuration (filesystem auto-discovery)
      # TODO(#49): Migrate to manifest-defined scripts once ros2_medkit#303 lands
      scripts:
        scripts_dir: "/var/lib/ros2_medkit/scripts"
        allow_uploads: false
        max_concurrent_executions: 3
        default_timeout_sec: 60

# Fault Manager configuration (runs in root namespace)
fault_manager:
  ros__parameters:
    # Storage configuration
    storage_type: "sqlite"
    database_path: "/var/lib/ros2_medkit/faults.db"

    # Debounce configuration
    confirmation_threshold: 0  # Immediate confirmation
    healing_enabled: false
    healing_threshold: 3
    auto_confirm_after_sec: 0.0

    # Snapshot configuration (freeze frames)
    snapshots:
      enabled: true
      background_capture: true  # Non-blocking capture
      timeout_sec: 2.0
      max_message_size: 131072  # 128KB max per message

      # Topics to capture for all faults.
      # /sensors/image_raw (30 Hz, 640x480 rgb8) is intentionally excluded
      # from snapshot capture - the raw camera feed would dominate the bag
      # (~27 MB/s), and LIDAR + IMU + GPS + diagnostics are the relevant
      # topics for the fault signatures this demo compares. For vision
      # forensics a CompressedImage topic can be added here instead.
      default_topics:
        - /sensors/scan
        - /sensors/imu
        - /sensors/fix
        - /diagnostics

      # Rosbag recording configuration
      rosbag:
        enabled: true
        duration_sec: 15.0  # Record 15 seconds before fault confirmation
        duration_after_sec: 10.0  # Record 10 seconds after confirmation
        lazy_start: false  # Always recording (ring buffer)
        format: "mcap"  # MCAP format (recommended for cross-platform)
        storage_path: "/var/lib/ros2_medkit/rosbags"
        max_bag_size_mb: 2000  # Single-file cap; prevents rosbag2 from splitting (gateway only serves the first file)
        max_total_storage_mb: 10000  # 10 GB total; higher than single-bag cap so auto_cleanup=false can retain multiple snapshots across runs without the per-file cap becoming unreachable
        auto_cleanup: false  # Retain rosbag on fault clear so the bridge can ingest it

        # Topics to record (use 'config' or 'all')
        topics: "config"  # Use include/exclude lists below
        include_topics:
          - /sensors/scan
          - /sensors/imu
          - /sensors/fix
          - /diagnostics
        exclude_topics:
          - /rosout
          - /parameter_events
